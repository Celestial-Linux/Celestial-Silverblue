; System-wide GameMode overrides.
; Merged on top of /usr/share/gamemode/gamemode.ini (this file wins).
; The renice and auth-less governor switching below require the invoking user
; to be a member of the `gamemode` group.

[general]
; Pin the CPU to the performance governor while a game runs (amd-pstate-epp).
; Also gives OBS/the encoder full clocks, so it helps recording too.
desiredgov=performance

; Renice the game (value is negated -> nice -10). Requires the gamemode group.
; NOTE: with software (x264) recording this can starve the encoder under a
; full-core game load -- drop to ~5 if you see dropped frames. With NVENC/VAAPI
; hardware encoding, -10 is fine and leaves plenty of CPU for the encoder.
renice=10

; Best-effort I/O priority for the game (0 = highest). Leave headroom for OBS's
; disk writes by not maxing this out.
ioprio=4

; Keep the screen awake during gamepad-only sessions.
inhibit_screensaver=1

; Disable split-lock detection while gaming (some titles trip it hard).
disable_splitlock=1

[custom]
; Switch to the low-latency tuned profile while a game runs, restore balanced
; after. switch_profile is allow_active=yes in polkit, so no root/run0 needed --
; these run as your session user. This mainly adds shallow C-states + swappiness
; tuning on top of gamemode's own desiredgov=performance, which helps audio
; (Discord/music) stay glitch-free during play.
start=tuned-adm profile latency-performance
; NOTE: hardcodes balanced on exit (your daily default). If you sometimes game
; from a different profile you'd want restored, capture/restore it instead.
end=tuned-adm profile balanced
script_timeout=10
