# Pin static UID/GIDs for system users that would otherwise collide.
#
# Their upstream sysusers.d entries use dynamic allocation (ID = "-"), and
# in this layered image build multiple users race for the same next-free
# descending GID -- e.g. pipewire + greetd both landed on 970, rtkit +
# wsdd on 969. systemd-sysusers is first-definition-wins by name and
# processes files in lexicographic order, so this 00- file is authoritative
# over pipewire.conf / greetd.conf / rtkit.conf.
#
# Values chosen from currently-free numbers in the system range; the audio
# path (pipewire, rtkit) keeps its existing GID so nothing that references
# it by number needs to change.
#
#Type Name      ID   GECOS                                           Home directory   Shell
u     pipewire  970  "PipeWire System Daemon"                        /run/pipewire    -
u     rtkit     969  "RealtimeKit"                                   -                -
u     greetd    950  "greetd daemon"                                 /var/lib/greetd  -
u     wsdd      951  "Web Services Dynamic Discovery host daemon"    -                -
