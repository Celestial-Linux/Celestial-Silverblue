# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
type: dnf
repos:
    copr:
        - name: ublue-os/akmods
          chroot: fedora-44-x86_64
        - name: atim/starship
          chroot: fedora-44-x86_64
        - name: imput/helium
          chroot: fedora-44-x86_64

    files:
        - charm.repo
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
install:
    packages:
        - google-roboto-fonts
        - openssh-askpass
        - file-roller
        - fastfetch
        - gamemode
        - mimalloc
        - glow
        - tailscale
        - starship
        - helium-bin
        - wcurl
        - git-lfs

        # MusicPresence
        - https://github.com/ungive/discord-music-presence/releases/download/v2.3.5/musicpresence-2.3.5-linux-x86_64.rpm
        # DeckMaster
        - https://github.com/muesli/deckmaster/releases/download/v0.9.0/deckmaster_0.9.0_linux_amd64.rpm
