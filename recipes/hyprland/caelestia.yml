# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    repos:
      copr:
        - name: celestelove/app2unit
          chroot: fedora-44-x86_64
        - name: celestelove/libcava
          chroot: fedora-44-x86_64
        - name: celestelove/caelestia
          chroot: fedora-44-x86_64
    install:
      packages:
        - libcava-devel
        - app2unit
        - ddcutil
        - brightnessctl
        - lm_sensors
        - fish
        - aubio
        - aubio-devel
        - pipewire-libs
        - qt6-qtdeclarative
        - swappy
        - libqalculate
        - qt6-qtbase
        - caelestia-shell
        - caelestia-cli
  - type: script
    scripts:
      - patch_caelestia_gtk_theme.sh
      - install_caelestia_nurture_scheme.sh
