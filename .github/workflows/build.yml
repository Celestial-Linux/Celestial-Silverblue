name: bluebuild
on:
    schedule:
        - cron:
              "00 06 * * *" # build at 06:00 UTC every day
              # (20 minutes after last ublue images start building)
    push:
        paths-ignore: # don't rebuild if only documentation has changed
            - "**.md"
    workflow_dispatch: # allow manually triggering builds
jobs:
    bluebuild:
        runs-on: ubuntu-latest
        name: Build Custom Image
        permissions:
            contents: read
            packages: write
            id-token: write
        strategy:
            fail-fast: false # stop GH from cancelling all matrix builds if one fails
            matrix:
                recipe:
                    # - recipe-silverblue.yml
                    # - recipe-silverblue-nvidia.yml
                    # - recipe-kinoite.yml
                    # - recipe-cosmic.yml
                    # - recipe-cosmic-nvidia.yml
                    # - recipe-cosmic-cachy.yml
                    - recipe-hyprland.yml
                    - recipe-hyprland-nvidia.yml
                    # - recipe-hyprland-cachy.yml
                    # - recipe-hyprland-cachy-nvidia.yml
        steps:
            - name: Checkout repo
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Retrieve Signing Key
              shell: bash
              run: |
                  echo "${{ secrets.KERNEL_PRIVKEY }}" > ./files/scripts/certs/private_key.priv
            # the build is fully handled by the reusable github action
            - name: Build Custom Image
              uses: blue-build/github-action@v1.11
              with:
                  recipe: ${{ matrix.recipe }}
                  cosign_private_key: ${{ secrets.SIGNING_SECRET }}
                  registry_token: ${{ github.token }}
                  pr_event_number: ${{ github.event.number }}

                  # enabled by default, disable if your image is small and you want faster builds
                  maximize_build_space: true
